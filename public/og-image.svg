<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#161719"/>

  <!-- Subtle background grid pattern -->
  <g stroke="#7ffed1" stroke-width="1" stroke-opacity="0.04">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Logo (cabinet grid icon) top-left -->
  <g transform="translate(80, 80)">
    <rect width="80" height="80" rx="14" fill="#0a0b0c" stroke="#7ffed1" stroke-width="2.5"/>
    <g fill="none" stroke="#7ffed1" stroke-width="3" stroke-linecap="round" transform="translate(12, 16)">
      <rect x="0" y="0" width="56" height="48" rx="3"/>
      <line x1="14" y1="0"  x2="14" y2="48"/>
      <line x1="28" y1="0"  x2="28" y2="48"/>
      <line x1="42" y1="0"  x2="42" y2="48"/>
      <line x1="0"  y1="16" x2="56" y2="16"/>
      <line x1="0"  y1="32" x2="56" y2="32"/>
    </g>
  </g>

  <!-- Wordmark "LED CALC" -->
  <text x="80" y="290"
        font-family="'Chakra Petch', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="120" font-weight="700"
        fill="#f1f5f9" letter-spacing="6">
    LED CALC
  </text>

  <!-- Tagline -->
  <text x="80" y="350"
        font-family="'Chakra Petch', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="34" font-weight="500"
        fill="#94a3b8">
    Calcolatore professionale pareti LED
  </text>

  <!-- Sub list -->
  <text x="80" y="400"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="20" font-weight="500"
        fill="#7ffed1" letter-spacing="2">
    RISOLUZIONE · CABINET · SORGENTE · PESO · CONSUMO
  </text>

  <!-- Bottom credit -->
  <text x="80" y="555"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="18" font-weight="500"
        fill="#64748b" letter-spacing="2">
    PWA · OFFLINE READY · @_hypemancio_
  </text>

  <!-- LED wall preview illustration (right side) -->
  <g transform="translate(720, 120)">
    <!-- Outer wall -->
    <rect x="0" y="0" width="400" height="200" rx="6"
          fill="rgba(127, 254, 209, 0.05)"
          stroke="#7ffed1" stroke-width="2.5"/>
    <!-- Internal cabinet grid (8 × 4) -->
    <g stroke="#7ffed1" stroke-width="1.2" stroke-opacity="0.35">
      <line x1="50"  y1="0" x2="50"  y2="200"/>
      <line x1="100" y1="0" x2="100" y2="200"/>
      <line x1="150" y1="0" x2="150" y2="200"/>
      <line x1="200" y1="0" x2="200" y2="200"/>
      <line x1="250" y1="0" x2="250" y2="200"/>
      <line x1="300" y1="0" x2="300" y2="200"/>
      <line x1="350" y1="0" x2="350" y2="200"/>
      <line x1="0" y1="50"  x2="400" y2="50"/>
      <line x1="0" y1="100" x2="400" y2="100"/>
      <line x1="0" y1="150" x2="400" y2="150"/>
    </g>
    <!-- Fit overlay (cyan, 16:9 inside 2:1 wall = letterbox left/right) -->
    <rect x="22" y="0" width="356" height="200"
          fill="rgba(34, 211, 238, 0.14)"
          stroke="#22d3ee" stroke-width="2"/>

    <!-- Label "Fit overlay" -->
    <text x="200" y="240"
          font-family="'JetBrains Mono', 'Courier New', monospace"
          font-size="16" font-weight="600"
          fill="#22d3ee" text-anchor="middle" letter-spacing="2">
      FIT · 16:9 ON 2:1 WALL
    </text>
  </g>

  <!-- Bottom-right hex dimensions string -->
  <text x="1120" y="555"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="14" font-weight="500"
        fill="#64748b" text-anchor="end" letter-spacing="1">
    2304 × 1152 px · 12 × 6 cab · 2.65 Mpx
  </text>
</svg>
